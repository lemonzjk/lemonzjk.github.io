<div class="accent-picker {{ include.class }}" data-accent-picker>
  {% if include.inline %}
    <span class="accent-picker__inline-label">
      <span class="accent-picker__dot" aria-hidden="true"></span>
      <span>{{ include.label }}</span>
    </span>
  {% else %}
    <button class="accent-picker__toggle" type="button" aria-label="{% if is_zh %}切换主题色{% else %}Change accent color{% endif %}" aria-haspopup="true" aria-expanded="false">
      <span class="accent-picker__dot" aria-hidden="true"></span>
      {% if include.label %}
        <span class="accent-picker__label">{{ include.label }}</span>
      {% endif %}
    </button>
  {% endif %}
  <div class="accent-picker__menu" role="menu" aria-label="{% if is_zh %}主题色{% else %}Accent colors{% endif %}">
    <button class="accent-picker__swatch accent-picker__swatch--coral" type="button" data-accent-value="coral" role="menuitemradio" aria-checked="true" aria-label="{% if is_zh %}珊瑚色{% else %}Coral{% endif %}"></button>
    <button class="accent-picker__swatch accent-picker__swatch--blue" type="button" data-accent-value="blue" role="menuitemradio" aria-checked="false" aria-label="{% if is_zh %}蓝色{% else %}Blue{% endif %}"></button>
    <button class="accent-picker__swatch accent-picker__swatch--teal" type="button" data-accent-value="teal" role="menuitemradio" aria-checked="false" aria-label="{% if is_zh %}青绿色{% else %}Teal{% endif %}"></button>
    <button class="accent-picker__swatch accent-picker__swatch--violet" type="button" data-accent-value="violet" role="menuitemradio" aria-checked="false" aria-label="{% if is_zh %}紫色{% else %}Violet{% endif %}"></button>
    <button class="accent-picker__swatch accent-picker__swatch--forest" type="button" data-accent-value="forest" role="menuitemradio" aria-checked="false" aria-label="{% if is_zh %}森林绿{% else %}Forest{% endif %}"></button>
    <button class="accent-picker__swatch accent-picker__swatch--indigo" type="button" data-accent-value="indigo" role="menuitemradio" aria-checked="false" aria-label="{% if is_zh %}靛蓝色{% else %}Indigo{% endif %}"></button>
    <button class="accent-picker__swatch accent-picker__swatch--rose" type="button" data-accent-value="rose" role="menuitemradio" aria-checked="false" aria-label="{% if is_zh %}玫瑰色{% else %}Rose{% endif %}"></button>
    <button class="accent-picker__swatch accent-picker__swatch--amber" type="button" data-accent-value="amber" role="menuitemradio" aria-checked="false" aria-label="{% if is_zh %}琥珀色{% else %}Amber{% endif %}"></button>
    <button class="accent-picker__swatch accent-picker__swatch--slate" type="button" data-accent-value="slate" role="menuitemradio" aria-checked="false" aria-label="{% if is_zh %}石板灰{% else %}Slate{% endif %}"></button>
  </div>
</div>
