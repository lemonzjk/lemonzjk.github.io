{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}
{% include seo-extra.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<!-- http://t.co/dKP3o1e -->
<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
  (function() {
    var root = document.documentElement;
    var storedTheme = localStorage.getItem('site-theme');
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    var theme = storedTheme || (prefersDark ? 'dark' : 'light');
    var storedAccent = localStorage.getItem('site-accent') || 'coral';
    var storedCustomAccent = localStorage.getItem('site-custom-accent') || '#4d6fa3';
    var allowedAccents = ['coral', 'blue', 'teal', 'violet', 'forest', 'indigo', 'rose', 'amber', 'slate', 'custom'];

    function isHexColor(value) {
      return /^#[0-9a-f]{6}$/i.test(value || '');
    }

    function hexToRgb(hex) {
      return {
        r: parseInt(hex.slice(1, 3), 16),
        g: parseInt(hex.slice(3, 5), 16),
        b: parseInt(hex.slice(5, 7), 16)
      };
    }

    function mixColor(color, target, amount) {
      return {
        r: Math.round(color.r * (1 - amount) + target.r * amount),
        g: Math.round(color.g * (1 - amount) + target.g * amount),
        b: Math.round(color.b * (1 - amount) + target.b * amount)
      };
    }

    function channelHex(channel) {
      var value = channel.toString(16);
      return value.length === 1 ? '0' + value : value;
    }

    function hexText(color) {
      return '#' + channelHex(color.r) + channelHex(color.g) + channelHex(color.b);
    }

    function rgbText(color) {
      return color.r + ', ' + color.g + ', ' + color.b;
    }

    function setAccentVar(name, value) {
      root.style.setProperty(name, value);
    }

    function applyCustomAccent(hex) {
      if (!isHexColor(hex)) return false;

      var color = hexToRgb(hex);
      var strong = mixColor(color, { r: 0, g: 0, b: 0 }, 0.14);
      var ink = mixColor(color, { r: 0, g: 0, b: 0 }, 0.22);
      var hover = mixColor(color, { r: 0, g: 0, b: 0 }, 0.34);
      var featureBg = mixColor(color, { r: 255, g: 255, b: 255 }, 0.93);
      var featureBorder = mixColor(color, { r: 255, g: 255, b: 255 }, 0.55);
      var dark = mixColor(color, { r: 255, g: 255, b: 255 }, 0.32);
      var darkStrong = mixColor(color, { r: 255, g: 255, b: 255 }, 0.45);
      var darkText = mixColor(color, { r: 255, g: 255, b: 255 }, 0.62);
      var darkCard = mixColor(color, { r: 17, g: 20, b: 24 }, 0.82);

      setAccentVar('--site-accent', hexText(color));
      setAccentVar('--site-accent-strong', hexText(strong));
      setAccentVar('--site-accent-ink', hexText(ink));
      setAccentVar('--site-accent-hover', hexText(hover));
      setAccentVar('--site-accent-soft', 'rgba(' + rgbText(color) + ', 0.1)');
      setAccentVar('--site-accent-softer', 'rgba(' + rgbText(color) + ', 0.065)');
      setAccentVar('--site-accent-border', 'rgba(' + rgbText(color) + ', 0.34)');
      setAccentVar('--site-accent-border-strong', 'rgba(' + rgbText(color) + ', 0.48)');
      setAccentVar('--site-accent-shadow', 'rgba(' + rgbText(color) + ', 0.18)');
      setAccentVar('--site-accent-feature-bg', hexText(featureBg));
      setAccentVar('--site-accent-feature-border', 'rgba(' + rgbText(featureBorder) + ', 0.78)');
      setAccentVar('--site-accent-dark', hexText(dark));
      setAccentVar('--site-accent-dark-strong', hexText(darkStrong));
      setAccentVar('--site-accent-dark-text', hexText(darkText));
      setAccentVar('--site-accent-dark-soft', 'rgba(' + rgbText(dark) + ', 0.14)');
      setAccentVar('--site-accent-dark-border', 'rgba(' + rgbText(darkStrong) + ', 0.42)');
      setAccentVar('--site-accent-dark-card', hexText(darkCard));
      setAccentVar('--site-accent-rgb', rgbText(color));
      setAccentVar('--site-accent-strong-rgb', rgbText(strong));
      setAccentVar('--site-accent-ink-rgb', rgbText(ink));
      return true;
    }

    var accent = allowedAccents.indexOf(storedAccent) > -1 ? storedAccent : 'coral';
    if (accent === 'custom' && !applyCustomAccent(storedCustomAccent)) accent = 'coral';
    root.setAttribute('data-theme', theme);
    root.setAttribute('data-accent', accent);
  })();
</script>

<!-- For all browsers -->
{% assign asset_version = site.asset_version | default: "1" %}
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css?v={{ asset_version }}">
{% if page.stylesheets %}
  {% for stylesheet in page.stylesheets %}
    <link rel="stylesheet" href="{{ stylesheet | prepend: base_path }}?v={{ asset_version }}">
  {% endfor %}
{% endif %}
<link rel="stylesheet" href="{{ base_path }}/assets/css/theme-toggle.css?v={{ asset_version }}">

<meta http-equiv="cleartype" content="on">
