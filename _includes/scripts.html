<script src="{{ base_path }}/assets/js/main.min.js?v={{ site.asset_version | default: "1" }}"></script>
<script>
(function() {
  var allowedAccents = ['coral', 'blue', 'teal', 'violet', 'forest', 'indigo', 'rose', 'amber', 'slate'];

  function getTheme() {
    return document.documentElement.getAttribute('data-theme') || 'light';
  }

  function getAccent() {
    var accent = document.documentElement.getAttribute('data-accent') || 'coral';
    return allowedAccents.indexOf(accent) > -1 ? accent : 'coral';
  }

  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('site-theme', theme);
    document.querySelectorAll('.theme-toggle').forEach(function(button) {
      var isDark = theme === 'dark';
      button.setAttribute('aria-pressed', isDark ? 'true' : 'false');
      button.classList.toggle('is-dark', isDark);
    });
  }

  function setAccent(accent) {
    var nextAccent = allowedAccents.indexOf(accent) > -1 ? accent : 'coral';
    document.documentElement.setAttribute('data-accent', nextAccent);
    localStorage.setItem('site-accent', nextAccent);
    document.querySelectorAll('.accent-picker__swatch').forEach(function(button) {
      var selected = button.getAttribute('data-accent-value') === nextAccent;
      button.setAttribute('aria-checked', selected ? 'true' : 'false');
      button.classList.toggle('is-active', selected);
    });
  }

  function closeAll() {
    document.querySelectorAll('.author__urls-wrapper.is-open').forEach(function(wrapper) {
      wrapper.classList.remove('is-open');
    });
    document.querySelectorAll('.accent-picker.is-open').forEach(function(picker) {
      var toggle = picker.querySelector('.accent-picker__toggle');
      picker.classList.remove('is-open');
      if (toggle) toggle.setAttribute('aria-expanded', 'false');
    });
  }

  function mastheadOffset() {
    var masthead = document.querySelector('.masthead');
    var height = masthead ? Math.ceil(masthead.getBoundingClientRect().height) : 70;
    return -(height + 18);
  }

  function normalizedPath(pathname) {
    return pathname.replace(/\/+$/, '') || '/';
  }

  function samePageHashUrl(anchor) {
    if (!anchor || !anchor.hash || anchor.hash === '#') return null;
    var url = new URL(anchor.href, window.location.href);
    if (url.origin !== window.location.origin) return null;
    if (normalizedPath(url.pathname) !== normalizedPath(window.location.pathname)) return null;
    return url;
  }

  function scrollToHash(hash, behavior) {
    var id = decodeURIComponent(hash.slice(1));
    var target = document.getElementById(id);
    if (!target) return false;
    var top = target.getBoundingClientRect().top + window.pageYOffset + mastheadOffset();
    window.scrollTo({ top: Math.max(0, top), behavior: behavior || 'smooth' });
    return true;
  }

  function isChinesePage() {
    var lang = document.documentElement.getAttribute('lang') || '';
    return lang.indexOf('zh') === 0 || window.location.pathname.indexOf('/zh/') === 0;
  }

  function copyText(text) {
    if (navigator.clipboard && window.isSecureContext) {
      return navigator.clipboard.writeText(text);
    }

    return new Promise(function(resolve, reject) {
      var textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.setAttribute('readonly', '');
      textarea.style.position = 'fixed';
      textarea.style.top = '-9999px';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.select();

      try {
        if (document.execCommand('copy')) {
          resolve();
        } else {
          reject(new Error('Copy command failed'));
        }
      } catch (error) {
        reject(error);
      } finally {
        document.body.removeChild(textarea);
      }
    });
  }

  function setBibCopyState(summary, state) {
    var label = summary.querySelector('span');
    if (!summary.dataset.defaultLabel && label) {
      summary.dataset.defaultLabel = label.textContent;
    }

    var copiedText = isChinesePage() ? '已复制' : 'Copied';
    var failedText = isChinesePage() ? '复制失败' : 'Copy failed';
    var defaultText = summary.dataset.defaultLabel || 'BibTeX';
    var nextText = defaultText;

    if (state === 'copied') nextText = copiedText;
    if (state === 'failed') nextText = failedText;
    if (label) label.textContent = nextText;

    summary.classList.toggle('is-copied', state === 'copied');
    summary.classList.toggle('is-copy-failed', state === 'failed');
    window.clearTimeout(summary._bibCopyTimer);

    if (state !== 'idle') {
      summary._bibCopyTimer = window.setTimeout(function() {
        setBibCopyState(summary, 'idle');
      }, 1400);
    }
  }

  function initBibCopy() {
    document.querySelectorAll('.pub-cite > summary.pub-link--bib').forEach(function(summary) {
      summary.addEventListener('click', function(event) {
        event.preventDefault();
        event.stopPropagation();

        var cite = summary.closest('.pub-cite');
        var pre = cite ? cite.querySelector('pre') : null;
        if (!pre) return;

        cite.open = false;
        copyText(pre.textContent.trim()).then(function() {
          setBibCopyState(summary, 'copied');
        }).catch(function() {
          setBibCopyState(summary, 'failed');
        });
      });
    });
  }

  function initBackToTop() {
    var button = document.querySelector('.back-to-top');
    if (!button) return;

    function updateVisibility() {
      var visible = window.pageYOffset > 420;
      button.hidden = false;
      button.classList.toggle('is-visible', visible);
    }

    button.addEventListener('click', function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      if (window.history && window.history.replaceState && window.location.hash) {
        window.history.replaceState(null, '', window.location.pathname + window.location.search);
      }
    });

    window.addEventListener('scroll', updateVisibility, { passive: true });
    updateVisibility();
  }

  function init() {
    document.querySelectorAll('.author__urls-wrapper').forEach(function(wrapper) {
      var button = wrapper.querySelector('button');
      var list = wrapper.querySelector('.author__urls');
      if (!button || !list) return;

      button.addEventListener('click', function(event) {
        event.preventDefault();
        event.stopPropagation();
        wrapper.classList.toggle('is-open');
      });
    });

    setTheme(getTheme());
    setAccent(getAccent());
    initBibCopy();

    document.querySelectorAll('.theme-toggle').forEach(function(button) {
      function toggleTheme(event) {
        event.preventDefault();
        event.stopPropagation();
        setTheme(getTheme() === 'dark' ? 'light' : 'dark');
      }

      button.addEventListener('click', toggleTheme);
      button.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' || event.key === ' ') {
          toggleTheme(event);
        }
      });
    });

    document.querySelectorAll('.accent-picker').forEach(function(picker) {
      var toggle = picker.querySelector('.accent-picker__toggle');
      var menu = picker.querySelector('.accent-picker__menu');
      if (!menu) return;

      if (toggle) {
        toggle.addEventListener('click', function(event) {
          event.preventDefault();
          event.stopPropagation();
          var willOpen = !picker.classList.contains('is-open');
          closeAll();
          picker.classList.toggle('is-open', willOpen);
          toggle.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
        });

        toggle.addEventListener('keydown', function(event) {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            toggle.click();
          }
        });
      }

      picker.querySelectorAll('.accent-picker__swatch').forEach(function(button) {
        button.addEventListener('click', function(event) {
          event.preventDefault();
          event.stopPropagation();
          setAccent(button.getAttribute('data-accent-value'));
          closeAll();
        });
      });
    });

    document.addEventListener('click', function() {
      closeAll();
    });

    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') closeAll();
    });

    initBackToTop();

    document.addEventListener('click', function(event) {
      var anchor = event.target.closest ? event.target.closest('a[href*="#"]') : null;
      var url = samePageHashUrl(anchor);
      if (!url || !scrollToHash(url.hash)) return;
      event.preventDefault();
      event.stopImmediatePropagation();
      if (window.history && window.history.pushState) {
        window.history.pushState(null, '', url.pathname + url.search + url.hash);
      } else {
        window.location.hash = url.hash;
      }
      closeAll();
    }, true);

    if (window.location.hash) {
      window.setTimeout(function() {
        scrollToHash(window.location.hash, 'auto');
      }, 120);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
