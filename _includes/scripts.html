<script src="{{ base_path }}/assets/js/main.min.js?v={{ site.asset_version | default: "1" }}"></script>
<script>
(function() {
  var allowedAccents = ['coral', 'blue', 'teal', 'violet', 'forest', 'indigo', 'rose', 'amber', 'custom'];
  var defaultCustomAccent = '#4d6fa3';
  var customAccentProperties = [
    '--site-accent',
    '--site-accent-strong',
    '--site-accent-ink',
    '--site-accent-hover',
    '--site-accent-soft',
    '--site-accent-softer',
    '--site-accent-border',
    '--site-accent-border-strong',
    '--site-accent-shadow',
    '--site-accent-feature-bg',
    '--site-accent-feature-border',
    '--site-accent-dark',
    '--site-accent-dark-strong',
    '--site-accent-dark-text',
    '--site-accent-dark-soft',
    '--site-accent-dark-border',
    '--site-accent-dark-card',
    '--site-accent-rgb',
    '--site-accent-strong-rgb',
    '--site-accent-ink-rgb'
  ];

  function isHexColor(value) {
    return /^#[0-9a-f]{6}$/i.test(value || '');
  }

  function customAccentColor() {
    var color = localStorage.getItem('site-custom-accent');
    return isHexColor(color) ? color : defaultCustomAccent;
  }

  function hexToRgb(hex) {
    return {
      r: parseInt(hex.slice(1, 3), 16),
      g: parseInt(hex.slice(3, 5), 16),
      b: parseInt(hex.slice(5, 7), 16)
    };
  }

  function mixColor(color, target, amount) {
    return {
      r: Math.round(color.r * (1 - amount) + target.r * amount),
      g: Math.round(color.g * (1 - amount) + target.g * amount),
      b: Math.round(color.b * (1 - amount) + target.b * amount)
    };
  }

  function channelHex(channel) {
    var value = channel.toString(16);
    return value.length === 1 ? '0' + value : value;
  }

  function hexText(color) {
    return '#' + channelHex(color.r) + channelHex(color.g) + channelHex(color.b);
  }

  function rgbText(color) {
    return color.r + ', ' + color.g + ', ' + color.b;
  }

  function clearCustomAccentVars() {
    customAccentProperties.forEach(function(name) {
      document.documentElement.style.removeProperty(name);
    });
  }

  function applyCustomAccent(hex) {
    if (!isHexColor(hex)) return false;

    var color = hexToRgb(hex);
    var strong = mixColor(color, { r: 0, g: 0, b: 0 }, 0.14);
    var ink = mixColor(color, { r: 0, g: 0, b: 0 }, 0.22);
    var hover = mixColor(color, { r: 0, g: 0, b: 0 }, 0.34);
    var featureBg = mixColor(color, { r: 255, g: 255, b: 255 }, 0.93);
    var featureBorder = mixColor(color, { r: 255, g: 255, b: 255 }, 0.55);
    var dark = mixColor(color, { r: 255, g: 255, b: 255 }, 0.32);
    var darkStrong = mixColor(color, { r: 255, g: 255, b: 255 }, 0.45);
    var darkText = mixColor(color, { r: 255, g: 255, b: 255 }, 0.62);
    var darkCard = mixColor(color, { r: 17, g: 20, b: 24 }, 0.82);
    var root = document.documentElement;

    root.style.setProperty('--site-accent', hexText(color));
    root.style.setProperty('--site-accent-strong', hexText(strong));
    root.style.setProperty('--site-accent-ink', hexText(ink));
    root.style.setProperty('--site-accent-hover', hexText(hover));
    root.style.setProperty('--site-accent-soft', 'rgba(' + rgbText(color) + ', 0.1)');
    root.style.setProperty('--site-accent-softer', 'rgba(' + rgbText(color) + ', 0.065)');
    root.style.setProperty('--site-accent-border', 'rgba(' + rgbText(color) + ', 0.34)');
    root.style.setProperty('--site-accent-border-strong', 'rgba(' + rgbText(color) + ', 0.48)');
    root.style.setProperty('--site-accent-shadow', 'rgba(' + rgbText(color) + ', 0.18)');
    root.style.setProperty('--site-accent-feature-bg', hexText(featureBg));
    root.style.setProperty('--site-accent-feature-border', 'rgba(' + rgbText(featureBorder) + ', 0.78)');
    root.style.setProperty('--site-accent-dark', hexText(dark));
    root.style.setProperty('--site-accent-dark-strong', hexText(darkStrong));
    root.style.setProperty('--site-accent-dark-text', hexText(darkText));
    root.style.setProperty('--site-accent-dark-soft', 'rgba(' + rgbText(dark) + ', 0.14)');
    root.style.setProperty('--site-accent-dark-border', 'rgba(' + rgbText(darkStrong) + ', 0.42)');
    root.style.setProperty('--site-accent-dark-card', hexText(darkCard));
    root.style.setProperty('--site-accent-rgb', rgbText(color));
    root.style.setProperty('--site-accent-strong-rgb', rgbText(strong));
    root.style.setProperty('--site-accent-ink-rgb', rgbText(ink));
    return true;
  }

  function getTheme() {
    return document.documentElement.getAttribute('data-theme') || 'light';
  }

  function getAccent() {
    var accent = document.documentElement.getAttribute('data-accent') || 'coral';
    if (accent === 'custom') {
      return isHexColor(localStorage.getItem('site-custom-accent')) ? 'custom' : 'coral';
    }
    return allowedAccents.indexOf(accent) > -1 ? accent : 'coral';
  }

  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('site-theme', theme);
    document.querySelectorAll('.theme-toggle').forEach(function(button) {
      var isDark = theme === 'dark';
      button.setAttribute('aria-pressed', isDark ? 'true' : 'false');
      button.classList.toggle('is-dark', isDark);
    });
  }

  function setAccent(accent, customColor) {
    var nextAccent = allowedAccents.indexOf(accent) > -1 ? accent : 'coral';
    var activeCustomColor = customAccentColor();

    if (nextAccent === 'custom') {
      activeCustomColor = isHexColor(customColor) ? customColor : activeCustomColor;
      if (applyCustomAccent(activeCustomColor)) {
        localStorage.setItem('site-custom-accent', activeCustomColor);
      } else {
        nextAccent = 'coral';
        clearCustomAccentVars();
      }
    } else {
      clearCustomAccentVars();
    }

    document.documentElement.setAttribute('data-accent', nextAccent);
    localStorage.setItem('site-accent', nextAccent);
    document.querySelectorAll('.accent-picker__swatch').forEach(function(button) {
      var selected = button.getAttribute('data-accent-value') === nextAccent;
      button.setAttribute('aria-checked', selected ? 'true' : 'false');
      button.classList.toggle('is-active', selected);
    });
    document.querySelectorAll('.accent-picker__custom').forEach(function(control) {
      control.classList.toggle('is-active', nextAccent === 'custom');
    });
    document.querySelectorAll('.accent-picker__custom-input').forEach(function(input) {
      input.value = activeCustomColor;
    });
  }

  function closeAll() {
    document.querySelectorAll('.author__urls-wrapper.is-open').forEach(function(wrapper) {
      wrapper.classList.remove('is-open');
    });
    document.querySelectorAll('.accent-picker.is-open').forEach(function(picker) {
      var toggle = picker.querySelector('.accent-picker__toggle');
      picker.classList.remove('is-open');
      if (toggle) toggle.setAttribute('aria-expanded', 'false');
    });
  }

  function mastheadOffset() {
    var masthead = document.querySelector('.masthead');
    var height = masthead ? Math.ceil(masthead.getBoundingClientRect().height) : 70;
    return -(height + 18);
  }

  function normalizedPath(pathname) {
    return pathname.replace(/\/+$/, '') || '/';
  }

  function samePageHashUrl(anchor) {
    if (!anchor || !anchor.hash || anchor.hash === '#') return null;
    var url = new URL(anchor.href, window.location.href);
    if (url.origin !== window.location.origin) return null;
    if (normalizedPath(url.pathname) !== normalizedPath(window.location.pathname)) return null;
    return url;
  }

  function scrollToHash(hash, behavior) {
    var id = decodeURIComponent(hash.slice(1));
    var target = document.getElementById(id);
    if (!target) return false;
    var top = target.getBoundingClientRect().top + window.pageYOffset + mastheadOffset();
    window.scrollTo({ top: Math.max(0, top), behavior: behavior || 'smooth' });
    return true;
  }

  function isChinesePage() {
    var lang = document.documentElement.getAttribute('lang') || '';
    return lang.indexOf('zh') === 0 || window.location.pathname.indexOf('/zh/') === 0;
  }

  function copyText(text) {
    if (navigator.clipboard && window.isSecureContext) {
      return navigator.clipboard.writeText(text);
    }

    return new Promise(function(resolve, reject) {
      var textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.setAttribute('readonly', '');
      textarea.style.position = 'fixed';
      textarea.style.top = '-9999px';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.select();

      try {
        if (document.execCommand('copy')) {
          resolve();
        } else {
          reject(new Error('Copy command failed'));
        }
      } catch (error) {
        reject(error);
      } finally {
        document.body.removeChild(textarea);
      }
    });
  }

  function setBibCopyState(summary, state) {
    var label = summary.querySelector('span');
    if (!summary.dataset.defaultLabel && label) {
      summary.dataset.defaultLabel = label.textContent;
    }

    var copiedText = isChinesePage() ? '已复制' : 'Copied';
    var failedText = isChinesePage() ? '复制失败' : 'Copy failed';
    var defaultText = summary.dataset.defaultLabel || 'BibTeX';
    var nextText = defaultText;

    if (state === 'copied') nextText = copiedText;
    if (state === 'failed') nextText = failedText;
    if (label) label.textContent = nextText;

    summary.classList.toggle('is-copied', state === 'copied');
    summary.classList.toggle('is-copy-failed', state === 'failed');
    window.clearTimeout(summary._bibCopyTimer);

    if (state !== 'idle') {
      summary._bibCopyTimer = window.setTimeout(function() {
        setBibCopyState(summary, 'idle');
      }, 1400);
    }
  }

  function initBibCopy() {
    document.querySelectorAll('.pub-cite > summary.pub-link--bib').forEach(function(summary) {
      summary.addEventListener('click', function(event) {
        event.preventDefault();
        event.stopPropagation();

        var cite = summary.closest('.pub-cite');
        var pre = cite ? cite.querySelector('pre') : null;
        if (!pre) return;

        cite.open = false;
        copyText(pre.textContent.trim()).then(function() {
          setBibCopyState(summary, 'copied');
        }).catch(function() {
          setBibCopyState(summary, 'failed');
        });
      });
    });
  }

  function initBackToTop() {
    var button = document.querySelector('.back-to-top');
    if (!button) return;

    function updateVisibility() {
      var visible = window.pageYOffset > 420;
      button.hidden = false;
      button.classList.toggle('is-visible', visible);
    }

    button.addEventListener('click', function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      if (window.history && window.history.replaceState && window.location.hash) {
        window.history.replaceState(null, '', window.location.pathname + window.location.search);
      }
    });

    window.addEventListener('scroll', updateVisibility, { passive: true });
    updateVisibility();
  }

  function initMastheadFit() {
    var nav = document.getElementById('site-nav');
    if (!nav) return;

    var button = Array.prototype.filter.call(nav.children, function(child) {
      return child.tagName && child.tagName.toLowerCase() === 'button';
    })[0];
    var visibleLinks = nav.querySelector('.visible-links');
    var hiddenLinks = nav.querySelector('.hidden-links');
    var tools = nav.querySelector('.masthead__tools');
    if (!button || !visibleLinks || !hiddenLinks || !tools) return;

    function itemOuterWidth(item) {
      var rect = item.getBoundingClientRect();
      var styles = window.getComputedStyle(item);
      return rect.width + parseFloat(styles.marginLeft || 0) + parseFloat(styles.marginRight || 0);
    }

    function listWidth(list) {
      return Array.prototype.reduce.call(list.children, function(total, item) {
        return total + itemOuterWidth(item);
      }, 0);
    }

    function availableWidth() {
      var navRect = nav.getBoundingClientRect();
      var toolsRect = tools.getBoundingClientRect();
      var styles = window.getComputedStyle(nav);
      var gap = parseFloat(styles.columnGap || styles.gap || 0) || 0;
      return Math.max(0, navRect.width - toolsRect.width - gap);
    }

    function visibleMovableItems() {
      return Array.prototype.filter.call(visibleLinks.children, function(item) {
        return !item.classList.contains('masthead__menu-item--lg');
      });
    }

    function hiddenNavItems() {
      return Array.prototype.filter.call(hiddenLinks.children, function(item) {
        return !item.classList.contains('masthead__menu-item--mobile-static');
      });
    }

    function moveToHidden(item) {
      hiddenLinks.insertBefore(item, hiddenLinks.firstChild);
    }

    function moveToVisible(item) {
      visibleLinks.appendChild(item);
    }

    function updateButtonState() {
      var hiddenCount = hiddenNavItems().length;
      button.setAttribute('count', hiddenCount);
      if (hiddenCount > 0 || window.innerWidth <= 768) {
        button.classList.remove('hidden');
      } else {
        button.classList.add('hidden');
        hiddenLinks.classList.add('hidden');
        button.classList.remove('close');
      }
    }

    function fitMasthead() {
      var guard = 0;
      var available = availableWidth();

      while (listWidth(visibleLinks) > available && visibleMovableItems().length && guard < 20) {
        var movable = visibleMovableItems();
        moveToHidden(movable[movable.length - 1]);
        guard += 1;
      }

      guard = 0;
      while (hiddenNavItems().length && guard < 20) {
        var item = hiddenNavItems()[0];
        moveToVisible(item);

        if (listWidth(visibleLinks) > availableWidth()) {
          moveToHidden(item);
          break;
        }

        guard += 1;
      }

      updateButtonState();
    }

    function scheduleFit() {
      window.requestAnimationFrame(fitMasthead);
    }

    scheduleFit();
    window.setTimeout(fitMasthead, 80);
    window.addEventListener('resize', scheduleFit, { passive: true });
    window.addEventListener('load', fitMasthead, { once: true });

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(fitMasthead).catch(function() {});
    }
  }

  function init() {
    document.querySelectorAll('.author__urls-wrapper').forEach(function(wrapper) {
      var button = wrapper.querySelector('button');
      var list = wrapper.querySelector('.author__urls');
      if (!button || !list) return;

      button.addEventListener('click', function(event) {
        event.preventDefault();
        event.stopPropagation();
        wrapper.classList.toggle('is-open');
      });
    });

    setTheme(getTheme());
    setAccent(getAccent());
    initBibCopy();
    initMastheadFit();

    document.querySelectorAll('.theme-toggle').forEach(function(button) {
      function toggleTheme(event) {
        event.preventDefault();
        event.stopPropagation();
        setTheme(getTheme() === 'dark' ? 'light' : 'dark');
      }

      button.addEventListener('click', toggleTheme);
      button.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' || event.key === ' ') {
          toggleTheme(event);
        }
      });
    });

    document.querySelectorAll('.accent-picker').forEach(function(picker) {
      var toggle = picker.querySelector('.accent-picker__toggle');
      var menu = picker.querySelector('.accent-picker__menu');
      if (!menu) return;

      if (toggle) {
        toggle.addEventListener('click', function(event) {
          event.preventDefault();
          event.stopPropagation();
          var willOpen = !picker.classList.contains('is-open');
          closeAll();
          picker.classList.toggle('is-open', willOpen);
          toggle.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
        });

        toggle.addEventListener('keydown', function(event) {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            toggle.click();
          }
        });
      }

      picker.querySelectorAll('.accent-picker__swatch').forEach(function(button) {
        button.addEventListener('click', function(event) {
          event.preventDefault();
          event.stopPropagation();
          setAccent(button.getAttribute('data-accent-value'));
          closeAll();
        });
      });

      picker.querySelectorAll('.accent-picker__custom-input').forEach(function(input) {
        input.value = customAccentColor();

        var customControl = input.closest ? input.closest('.accent-picker__custom') : null;
        if (customControl) {
          customControl.addEventListener('click', function(event) {
            event.stopPropagation();
          });
        }

        input.addEventListener('click', function(event) {
          event.stopPropagation();
        });

        input.addEventListener('input', function(event) {
          event.stopPropagation();
          setAccent('custom', input.value);
        });

        input.addEventListener('change', function(event) {
          event.stopPropagation();
          setAccent('custom', input.value);
        });
      });
    });

    document.addEventListener('click', function() {
      closeAll();
    });

    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') closeAll();
    });

    initBackToTop();

    document.addEventListener('click', function(event) {
      var anchor = event.target.closest ? event.target.closest('a[href*="#"]') : null;
      var url = samePageHashUrl(anchor);
      if (!url || !scrollToHash(url.hash)) return;
      event.preventDefault();
      event.stopImmediatePropagation();
      if (window.history && window.history.pushState) {
        window.history.pushState(null, '', url.pathname + url.search + url.hash);
      } else {
        window.location.hash = url.hash;
      }
      closeAll();
    }, true);

    if (window.location.hash) {
      window.setTimeout(function() {
        scrollToHash(window.location.hash, 'auto');
      }, 120);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
